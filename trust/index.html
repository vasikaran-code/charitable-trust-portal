<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Nambikkai Charitable Trust — a non-profit working to uplift underprivileged communities through education, healthcare, and sustainable development."
    />
    <meta name="theme-color" content="#15694f" />

    <!--
      Fonts: Poppins for headings, Inter for body text (Latin).
      Noto Sans <script> covers the Indic languages (Tamil, Telugu, Devanagari
      for Hindi, Malayalam, Kannada) so translated text never renders as missing
      "tofu" boxes regardless of the fonts installed on the visitor's device.
      The browser only downloads the font for the script actually shown.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700&family=Noto+Sans+Tamil:wght@400;500;600;700&family=Noto+Sans+Telugu:wght@400;500;600;700&family=Noto+Sans+Devanagari:wght@400;500;600;700&family=Noto+Sans+Malayalam:wght@400;500;600;700&family=Noto+Sans+Kannada:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <title>Nambikkai Charitable Trust</title>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
